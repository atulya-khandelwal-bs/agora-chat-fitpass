syntax = "proto3";

option go_package = "protos/healthCoachCall";
option php_namespace = "HealthCoachCall";
option php_metadata_namespace = "GPBMetadata\\HealthCoachCall";

package health_coach_call;

service HealthCoachCall  {
  rpc ScheduleCall (CallRequest) returns (HealthCoachCallResponse) {}
  rpc CancelCall (CallRequest) returns (HealthCoachCallResponse) {}
  rpc UpdateCallStatus (CallRequest) returns (HealthCoachCallResponse) {}
}

message HealthCoachCallResponse {
  string message = 1;
  int32 code = 2;
}

message CallRequest {
  int64 health_coach_id = 1;
  int64 call_time = 2;
  string call_type = 3;
  string call_purpose = 4;
  int64 user_id = 5;
  int32 user_type = 6;
  int64 schedule_call_id = 7;
  string request_source = 8;
  string project_name = 9;
  string created_by = 10;
  string updated_by = 11;
  int32 status = 12;
  string internal_remarks =13;
  string customer_remarks = 14;
  string call_source = 15;
  bool is_new_fitfeast_dashboard = 16;
}
