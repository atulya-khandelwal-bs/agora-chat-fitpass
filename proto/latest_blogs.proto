syntax = "proto3";

option go_package = "protos/latest_blogs";
option php_namespace = "LatestBlogs";
option php_metadata_namespace = "GPBMetadata\\LatestBlogs";

package latest_blogs;

service  LatestBlogService  {
  rpc GetLatestBlogs (LatestBlogRequest) returns (Response) {}
}

message LatestBlogRequest {
  int64 user_id = 1;
}

message Response {
  string message = 1;
  int32 code = 2;
  repeated Blog blogs = 3;
}

message Blog {
  string blog_title = 1;
  string short_content = 2;
  string publish_date = 3;
  string update_time = 4;
  string create_time = 5;
  string seo_url = 6;
  int32 team_member_id = 7;
  string published_by = 8;
  string banner_image = 9;
  string blog_type = 10;
  string publisher_photo = 11;
  string author_url = 12;
  string original_seo_url = 13;
}
